<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="h-screen w-screen flex flex-col bg-slate-900 text-white overflow-hidden relative"
     th:fragment="content" id="game-container">
    
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }
        #loading-spinner { transition: opacity 0.5s; opacity: 0; }
        .htmx-request #loading-spinner { opacity: 1; }
        
        .card-glow-active { box-shadow: 0 0 15px rgba(250,204,21,0.5); border-color: #facc15 !important; }
        .damage-preview-float { animation: float-up 2s ease-out infinite; }
        @keyframes float-up {
            0% { transform: translateY(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
        .support-slot, .summon-slot {
            width: 60px; height: 80px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px dashed rgba(100, 116, 139, 0.5);
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px;
        }
    </style>

    <!-- Global Loading Spinner -->
    <div id="loading-spinner" class="htmx-indicator fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm pointer-events-none">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-indigo-400 font-bold tracking-widest animate-pulse">WAITING...</span>
        </div>
    </div>
    
    <div th:if="${match == null}" class="w-full h-full flex items-center justify-center">
        <p>No active match.</p>
    </div>

    <div th:if="${match != null}" class="flex flex-col w-full h-full">
        
        <!-- TOP: Opponent Side -->
        <div class="h-1/2 flex flex-col p-4 border-b border-slate-800 bg-red-900/5">
            <div class="flex justify-between items-start h-full">
                
                <!-- Opponent Support (Left) -->
                <div class="w-48 flex flex-wrap gap-2 content-start">
                    <div th:each="support : ${match.players[1].supportZone}" class="support-slot border-solid bg-slate-800/80 border-indigo-500/50">
                        <span class="text-[8px] text-center px-1" th:text="${support.name}"></span>
                        <span class="text-xs font-bold text-indigo-400" th:text="${support.usages}"></span>
                    </div>
                </div>

                <!-- Opponent Characters (Center) -->
                <div class="flex-grow flex justify-center gap-6 items-center">
                    <div th:each="char, iter : ${match.players[1].characters}" 
                         class="relative p-2 border-2 rounded-lg bg-slate-800 flex flex-col items-center w-28 transition-all"
                         th:classappend="${(iter.index == match.players[1].activeCharacterIndex ? 'card-glow-active' : 'border-slate-700') + (char.isAlive ? '' : ' grayscale opacity-50')}">
                        
                        <!-- HP -->
                        <div class="absolute -top-3 -left-3 w-8 h-8 rounded-full bg-slate-900 border-2 border-red-500 flex items-center justify-center font-bold text-sm"
                             th:text="${char.currentHp}">10</div>
                        
                        <!-- Damage Preview -->
                        <div th:if="${preview != null && preview.targetDamage.containsKey(char.id)}" 
                             class="absolute -top-10 left-0 right-0 flex flex-col items-center damage-preview-float z-10">
                            <span class="text-red-500 font-black text-xl drop-shadow-[0_0_5px_rgba(0,0,0,1)]"
                                  th:text="'-' + ${preview.targetDamage.get(char.id)}"></span>
                            <span th:if="${preview.reactions.containsKey(char.id)}"
                                  class="text-xs font-bold text-yellow-400 px-1 bg-slate-900/80 rounded"
                                  th:text="${preview.reactions.get(char.id)} + '!'"></span>
                        </div>

                        <span class="font-bold text-xs" th:text="${char.name}">Character</span>
                        
                        <!-- Energy -->
                        <div class="flex gap-1 mt-1">
                            <div th:each="e : ${#numbers.sequence(1, char.maxEnergy)}" 
                                 class="w-2 h-2 rounded-full border border-slate-600"
                                 th:classappend="${e <= char.currentEnergy} ? 'bg-yellow-400' : 'bg-slate-900'"></div>
                        </div>

                        <!-- Elements -->
                        <div class="flex flex-wrap gap-0.5 mt-1">
                            <span th:each="el : ${char.appliedElements}" class="text-[8px] px-1 rounded bg-slate-700" th:text="${el}"></span>
                        </div>

                        <!-- Statuses -->
                        <div class="flex flex-col gap-0.5 mt-1 w-full px-1">
                            <div th:each="status : ${char.activeStatuses}" 
                                 class="text-[7px] bg-indigo-900/40 border border-indigo-500/30 rounded flex justify-between px-1">
                                <span th:text="${status.name}">Armor</span>
                                <span th:text="${status.durationRounds}">2</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Opponent Summon (Right) -->
                <div class="w-48 flex flex-wrap gap-2 content-start justify-end">
                    <div th:each="summon : ${match.players[1].summonsZone}" class="summon-slot border-solid bg-slate-800/80 border-red-500/50">
                        <span class="text-[8px] text-center px-1" th:text="${summon.name}"></span>
                        <span class="text-xs font-bold text-red-400" th:text="${summon.usages}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM: Player Side -->
        <div class="h-1/2 flex flex-col p-4 bg-blue-900/5 relative">
            
            <!-- Round & Dice Info (Top of bottom half) -->
            <div class="absolute top-2 left-1/2 -translate-x-1/2 flex flex-col items-center">
                 <div class="flex gap-1">
                    <div th:each="entry : ${match.players[0].dicePool}" 
                         th:if="${entry.value > 0}"
                         class="px-2 py-0.5 bg-slate-800 border border-slate-600 rounded text-[10px] flex items-center gap-1">
                        <span th:text="${entry.key}"></span>
                        <span class="font-bold text-indigo-400" th:text="${entry.value}"></span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-end h-full">
                
                <!-- Player Support (Left) -->
                <div class="w-48 flex flex-wrap gap-2 content-end">
                    <div th:each="support : ${match.players[0].supportZone}" class="support-slot border-solid bg-slate-800/80 border-indigo-500/50">
                        <span class="text-[8px] text-center px-1" th:text="${support.name}"></span>
                        <span class="text-xs font-bold text-indigo-400" th:text="${support.usages}"></span>
                    </div>
                </div>

                <!-- Player Characters (Center) -->
                <div class="flex-grow flex justify-center gap-6 items-center pb-12">
                    <div th:each="char, iter : ${match.players[0].characters}" 
                         class="relative p-2 border-2 rounded-lg bg-slate-800 flex flex-col items-center w-28 cursor-pointer group transition-all"
                         th:classappend="${(iter.index == match.players[0].activeCharacterIndex ? 'card-glow-active' : 'border-slate-700') + (char.isAlive ? '' : ' grayscale opacity-50')}"
                         hx-post="/game/action/switch"
                         th:attr="hx-vals='{&quot;targetIndex&quot;: ' + ${iter.index} + '}'"
                         hx-target="#game-container"
                         hx-swap="outerHTML"
                         hx-indicator="#loading-spinner">
                        
                        <div class="absolute -top-3 -left-3 w-8 h-8 rounded-full bg-slate-900 border-2 border-blue-500 flex items-center justify-center font-bold text-sm"
                             th:text="${char.currentHp}">10</div>
                        
                        <span class="font-bold text-xs" th:text="${char.name}">Character</span>
                        
                        <div class="flex gap-1 mt-1">
                            <div th:each="e : ${#numbers.sequence(1, char.maxEnergy)}" 
                                 class="w-2 h-2 rounded-full border border-slate-600"
                                 th:classappend="${e <= char.currentEnergy} ? 'bg-yellow-400' : 'bg-slate-900'"></div>
                        </div>

                        <!-- Statuses -->
                        <div class="flex flex-col gap-0.5 mt-1 w-full px-1">
                            <div th:each="status : ${char.activeStatuses}" 
                                 class="text-[7px] bg-indigo-900/40 border border-indigo-500/30 rounded flex justify-between px-1">
                                <span th:text="${status.name}">Armor</span>
                                <span th:text="${status.durationRounds}">2</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Player Summon (Right) -->
                <div class="w-48 flex flex-wrap gap-2 content-end justify-end">
                    <div th:each="summon : ${match.players[0].summonsZone}" class="summon-slot border-solid bg-slate-800/80 border-red-500/50">
                        <span class="text-[8px] text-center px-1" th:text="${summon.name}"></span>
                        <span class="text-xs font-bold text-red-400" th:text="${summon.usages}"></span>
                    </div>
                </div>
            </div>

            <!-- HAND (Floating bottom center) -->
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                <div th:each="card : ${match.players[0].hand}" 
                     class="w-20 h-28 bg-slate-800 border border-slate-600 rounded-md p-1 flex flex-col justify-between hover:-translate-y-4 transition-transform cursor-pointer group relative"
                     hx-post="/game/action/play"
                     th:attr="hx-vals='{&quot;cardId&quot;: &quot;' + ${card.id} + '&quot;}'"
                     hx-target="#game-container">
                    <div class="flex justify-between items-start">
                        <div class="w-5 h-5 rounded-full bg-indigo-600 text-[10px] flex items-center justify-center font-bold"
                             th:text="${card.cost[0].amount}">3</div>
                        <span class="text-[8px] text-slate-400" th:text="${card.type}">SUP</span>
                    </div>
                    <span class="text-[10px] font-bold text-center leading-tight" th:text="${card.name}">Card Name</span>
                    <div class="h-1/3"></div>

                    <!-- Tuning Toggle (Simplified) -->
                    <button class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-yellow-600 text-[10px] hidden group-hover:flex items-center justify-center border border-white"
                            hx-post="/game/action/tuning"
                            th:attr="hx-vals='{&quot;cardId&quot;: &quot;' + ${card.id} + '&quot;, &quot;element&quot;: &quot;OMNI&quot;}'"
                            hx-target="#game-container"
                            onclick="event.stopPropagation()">
                        T
                    </button>
                </div>
            </div>

            <!-- SKILLS (Bottom Right) -->
            <div class="absolute bottom-6 right-6 flex gap-4">
                
                <!-- If Previewing -->
                <div th:if="${preview != null}" class="flex gap-4">
                     <button hx-post="/game/action/skill"
                            th:attr="hx-vals='{&quot;skillId&quot;: &quot;' + ${previewSkillId} + '&quot;}'"
                            hx-target="#game-container"
                            class="px-6 py-3 bg-green-600 hover:bg-green-700 rounded-full font-black shadow-lg">
                        CONFIRM
                    </button>
                    <button hx-get="/game" hx-target="#game-container"
                            class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-full font-bold">
                        CANCEL
                    </button>
                </div>

                <!-- Normal Skills -->
                <div th:if="${preview == null}" class="flex gap-3">
                    <div th:each="skill : ${match.players[0].getActiveCharacter().skills}" class="flex flex-col items-center">
                        <button hx-post="/game/action/preview"
                                th:attr="hx-vals='{&quot;skillId&quot;: &quot;' + ${skill.id} + '&quot;}'"
                                hx-target="#game-container"
                                class="w-16 h-16 rounded-full bg-indigo-600 hover:bg-indigo-500 border-2 border-indigo-400 flex flex-col items-center justify-center shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-transform active:scale-95"
                                th:disabled="${match.isForcedSwitchRequired(userId) || !match.players[0].getActiveCharacter().isAlive || match.getActivePlayer().userId != userId}">
                            <span class="text-[10px] font-bold text-center px-1" th:text="${skill.name}">Skill</span>
                        </button>
                        <div class="flex gap-0.5 mt-1">
                            <span th:each="cost : ${skill.cost}" class="text-[8px] font-bold text-slate-300">
                                <span th:text="${cost.amount}"></span><span th:text="${cost.element}"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- End Phase Button -->
                <button hx-post="/game/action/end" 
                        hx-target="#game-container" 
                        class="w-16 h-16 rounded-full bg-red-600 hover:bg-red-700 border-2 border-red-400 flex items-center justify-center font-bold text-xs shadow-lg disabled:opacity-50"
                        th:disabled="${match.isForcedSwitchRequired(userId) || match.getActivePlayer().userId != userId}">
                    END
                </button>
            </div>

            <!-- LOG (Floating Top Right) -->
            <div class="absolute top-4 right-4 w-64 h-32 bg-slate-800/50 rounded overflow-y-auto p-2 text-[10px] font-mono border border-slate-700/50" id="game-log">
                <div th:each="log : ${match.generateTextLog()}" class="mb-1 text-slate-300">
                    > <span th:text="${log}"></span>
                </div>
                <script>document.getElementById('game-log').scrollTop = document.getElementById('game-log').scrollHeight;</script>
            </div>

            <!-- ROUND INFO (Top Left) -->
            <div class="absolute top-4 left-4 flex flex-col">
                <span class="text-2xl font-black text-indigo-500">ROUND <span th:text="${match.roundNumber}">1</span></span>
                <span class="text-xs font-bold text-slate-500" th:text="${match.phase}">PHASE</span>
            </div>

        </div>
    </div>
</div>
</body>
</html>
